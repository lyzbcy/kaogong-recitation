<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#1E3A24">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>政治理论背诵 · 磨耳朵</title>
<style>
:root{
  --cream:#FAF6EB; --paper:#F3EDDD; --forest:#1E3A24; --sky:#BCD8EE;
  --sage:#AFCDA8; --ink:#1A2018; --marker:#F5E08A; --brick:#B5482A;
  --correct:#2F7D46; --wrong:#B5482A;
  --font-display:"Archivo Black","Noto Sans SC","PingFang SC",sans-serif;
  --font-head:"Poppins","Noto Sans SC","PingFang SC",sans-serif;
  --font-body:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;
  --font-mono:"Roboto Mono","JetBrains Mono",monospace;
  --radius-pill:999px; --radius-card:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --player-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--font-body);line-height:1.75;font-size:16px;padding-bottom:calc(var(--player-h) + var(--safe-bottom) + 12px)}
a{color:var(--brick)}

/* ===== 密码门（未解密前唯一可见） ===== */
#gate{position:fixed;inset:0;z-index:9999;background:var(--forest);color:#EAF3E0;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
#gate.unlocked{display:none}
.gate-box{max-width:380px;width:100%;text-align:center;padding:8px}
.gate-box .logo{font-size:2.6rem;line-height:1;margin-bottom:8px}
.gate-box h1{font-family:var(--font-display);font-size:1.5rem;margin:6px 0 4px;color:#fff;letter-spacing:.5px}
.gate-box .who{color:var(--marker);font-size:.9rem;margin-bottom:24px}
.gate-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:22px 20px;backdrop-filter:none}
.gate-hint{font-size:.86rem;color:#AFCDA8;margin-bottom:6px}
.gate-hint b{color:var(--marker)}
.gate-q{font-size:.95rem;color:#fff;margin-bottom:14px}
#pwdInput{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:10px;color:#fff;padding:13px 14px;font-size:1rem;font-family:var(--font-body);text-align:center;outline:none;transition:.15s}
#pwdInput::placeholder{color:rgba(255,255,255,.4)}
#pwdInput:focus{border-color:var(--marker);background:rgba(255,255,255,.18)}
#unlockBtn{width:100%;margin-top:12px;background:var(--marker);color:var(--forest);border:none;border-radius:10px;padding:13px;font-family:var(--font-head);font-size:1rem;font-weight:700;cursor:pointer;transition:.15s}
#unlockBtn:active{transform:scale(.98)}
#unlockBtn:disabled{opacity:.5}
#gateErr{margin-top:10px;font-size:.84rem;color:#FFB39E;min-height:18px}
.gate-foot{margin-top:18px;font-size:.72rem;color:#6F8C66;line-height:1.6}
/* 解密后把内容区显示 */
#app{display:none}
#app.shown{display:block}

/* ===== 顶部栏 ===== */
.topbar{position:sticky;top:0;z-index:50;background:var(--forest);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.topbar .menu-btn{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;padding:4px 8px;line-height:1;border-radius:6px}
.topbar .menu-btn:active{background:rgba(255,255,255,.15)}
.topbar .title{font-family:var(--font-head);font-size:1.02rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .stats{font-size:.74rem;color:var(--marker);font-family:var(--font-mono);white-space:nowrap}

/* ===== 侧边导航（桌面固定 / 手机抽屉） ===== */
.sidenav{position:fixed;top:0;left:0;width:300px;max-width:85vw;height:100vh;background:var(--forest);color:#EAF3E0;z-index:200;overflow-y:auto;transform:translateX(-100%);transition:transform .25s ease;padding:18px 0 var(--player-h)}
.sidenav.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.3)}
.sidenav .nav-head{padding:6px 18px 12px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
.sidenav .nav-head h2{font-family:var(--font-display);font-size:1.1rem;margin:0;color:#fff}
.sidenav .nav-head p{font-size:.74rem;color:#AFCDA8;margin:4px 0 0}
.nav-item{display:block;padding:8px 18px;color:#D6E7C8;text-decoration:none;font-size:.88rem;border-left:3px solid transparent;transition:.12s;cursor:pointer}
.nav-item:hover,.nav-item:active{background:rgba(255,255,255,.08);color:#fff}
.nav-item.lvl1{font-family:var(--font-head);font-weight:600;color:var(--marker);margin-top:10px;font-size:.92rem;border-left:none;padding-top:12px}
.nav-item.lvl2{padding-left:24px;font-size:.86rem;border-left:none}
.nav-item.lvl3{padding-left:40px;font-size:.82rem}
.nav-item.active{background:rgba(245,224,138,.15);color:#fff;border-left-color:var(--marker)}
.nav-close{display:none}
.mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.mask.show{display:block}

/* ===== 主内容区 ===== */
.main{max-width:780px;margin:0 auto;padding:18px 18px 30px}
.reader-h1{font-family:var(--font-display);font-size:1.5rem;color:var(--forest);margin:8px 0 4px;line-height:1.3}
.reader-sub{color:#7a7058;font-size:.84rem;margin-bottom:6px;font-family:var(--font-mono)}
.reader-sub b{color:var(--brick)}
.sec-title{font-family:var(--font-head);font-size:1.2rem;color:var(--forest);border-left:5px solid var(--brick);padding-left:10px;margin:26px 0 12px;scroll-margin-top:64px}
.chapter-card{background:var(--paper);border-radius:var(--radius-card);padding:18px 20px;margin-bottom:16px;border:1px solid #E4DAC0}
.chapter-card.current{border:2px solid var(--forest);box-shadow:0 0 0 3px var(--sage)}
.cc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.cc-head h3{font-size:1.05rem;color:var(--forest);margin:0;flex:1}
.cc-actions{display:flex;gap:6px;flex-shrink:0}
.mini-btn{background:var(--forest);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:.78rem;cursor:pointer;font-family:var(--font-head);white-space:nowrap}
.mini-btn:active{transform:scale(.95)}
.mini-btn.play{background:var(--brick)}
.mini-btn.alt{background:var(--sage);color:var(--forest)}

/* 正文段落：保留挖空 */
.body-text{font-size:1rem;line-height:1.9;color:var(--ink)}
.body-text p{margin:0 0 10px}
.body-text .blank{display:inline-block;min-width:48px;border-bottom:2px solid var(--brick);background:rgba(181,72,42,.08);padding:0 6px;margin:0 2px;color:transparent;font-weight:600}
.body-text .blank::selection{background:transparent}
.body-text .blank-reveal{color:var(--brick);background:rgba(245,224,138,.4)}
.body-text .ezhi{background:#FBF3D0;border-left:3px solid var(--marker);padding:6px 10px;border-radius:0 6px 6px 0;font-size:.92rem;display:block;margin:6px 0}
.body-text .ezhi b{color:var(--brick)}
/* 标题级文本行 */
.body-text .ln{display:block}
.tool-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
.tool-btn{background:var(--paper);border:1px solid #D9CFAE;border-radius:8px;padding:7px 12px;font-size:.82rem;cursor:pointer;font-family:var(--font-body);color:var(--forest)}
.tool-btn:active{transform:scale(.96)}
.tool-btn.on{background:var(--marker);border-color:var(--forest)}

/* 闯关题 */
.quiz-wrap{margin-top:12px;border-top:1px dashed #C9BD9A;padding-top:12px}
.quiz-tag{display:inline-block;background:var(--brick);color:#fff;font-size:.72rem;padding:2px 8px;border-radius:5px;font-family:var(--font-mono);margin-bottom:8px}
.task{background:#fff;border:1px solid #D9CFAE;border-radius:var(--radius-card);padding:14px 16px;margin-bottom:12px}
.task .q{font-weight:600;margin-bottom:10px;font-size:.96rem}
.task .q .qn{color:var(--brick);font-family:var(--font-mono);margin-right:6px}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.opt{text-align:left;background:var(--paper);border:1px solid #D9CFAE;border-radius:8px;padding:10px 12px;cursor:pointer;font-size:.92rem;font-family:var(--font-body);transition:.1s}
.opt:active{background:#EFE7CF}
.opt.selected{background:var(--sky);border-color:var(--forest);font-weight:600}
.check{background:var(--forest);color:#fff;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;font-family:var(--font-head);font-size:.88rem}
.check:active{transform:scale(.97)}
.feedback{margin-top:10px;padding:9px 12px;border-radius:8px;font-size:.86rem;background:#F0EAD6;min-height:18px;line-height:1.6}
.feedback.ok{background:#E2F0E0;color:var(--correct)}
.feedback.no{background:#FBEDE6;color:var(--wrong)}

/* 章内导航 */
.chap-nav{display:flex;justify-content:space-between;gap:10px;margin:24px 0 10px}
.chap-nav button{flex:1;background:var(--paper);border:1px solid #D9CFAE;border-radius:10px;padding:12px;cursor:pointer;font-family:var(--font-head);color:var(--forest);font-size:.88rem;text-align:left}
.chap-nav button:active{transform:scale(.98)}
.chap-nav button:disabled{opacity:.4}
.chap-nav .nx{text-align:right}

/* ===== 底部播放器（移动端核心） ===== */
.player{position:fixed;left:0;right:0;bottom:0;height:calc(var(--player-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--forest);color:#fff;z-index:100;display:none;align-items:center;gap:8px;padding-left:12px;padding-right:12px;box-shadow:0 -2px 12px rgba(0,0,0,.18)}
.player.show{display:flex}
.p-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.p-btn:active{transform:scale(.92)}
.p-btn.main{background:var(--marker);color:var(--forest);width:46px;height:46px;font-size:1.2rem}
.p-btn:disabled{opacity:.35}
.p-info{flex:1;min-width:0;text-align:left;line-height:1.25}
.p-info .p-now{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-info .p-sub{font-size:.7rem;color:var(--marker);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-rate{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:7px 9px;font-size:.74rem;font-family:var(--font-mono);cursor:pointer;flex-shrink:0}

/* 浮条推广 */
.promo-fab{position:fixed;right:14px;bottom:calc(var(--player-h) + var(--safe-bottom) + 14px);z-index:90}
.promo-fab button{background:var(--brick);color:#fff;border:none;border-radius:var(--radius-pill);padding:9px 14px;cursor:pointer;font-family:var(--font-head);font-size:.8rem;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(20,30,18,.55);z-index:1000;align-items:center;justify-content:center;padding:18px}
.modal-mask.open{display:flex}
.modal{background:var(--cream);border-radius:16px;max-width:420px;width:100%;padding:22px;max-height:88vh;overflow-y:auto}
.modal h3{margin-bottom:6px;color:var(--forest)}
.modal .tag{display:inline-block;background:var(--sage);color:var(--forest);font-size:.72rem;padding:2px 8px;border-radius:5px}
.modal p{font-size:.9rem}
.qr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.qr-cell{background:var(--paper);border-radius:10px;padding:10px 6px;text-align:center;font-size:.76rem}
.qr-cell .ph{width:100%;aspect-ratio:1;background:#fff;border:1px dashed #C9BD9A;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:5px;font-size:1.1rem}

footer{text-align:center;padding:20px 16px;font-size:.8rem;color:#6b6048;border-top:1px solid #E0D6B8;margin-top:24px}
footer a{font-weight:700}

/* 桌面端：侧边栏常驻 */
@media(min-width:900px){
  body{padding-left:300px;padding-bottom:calc(var(--player-h) + var(--safe-bottom) + 12px)}
  .sidenav{transform:translateX(0);box-shadow:none}
  .menu-btn{display:none}
  .mask{display:none !important}
  .nav-close{display:none}
  .topbar{left:300px}
  .main{padding:22px 30px 30px}
  .promo-fab{bottom:calc(var(--player-h) + var(--safe-bottom) + 18px);right:24px}
}
@media(max-width:899px){
  .nav-close{display:block;text-align:right;padding:0 18px 8px}
  .nav-close button{background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer;line-height:1}
}
/* 大屏阅读舒适度 */
@media(min-width:1100px){
  .main{max-width:820px}
}
</style>
</head>
<body>

<div id="gate">

<!-- ===== 加密数据（密文，F12 只能看到密文） ===== -->
<script src="encrypted-data.js"></script>

<!-- ===== 应用逻辑 ===== -->
<script>
(function(){
"use strict";

// ---------- 加密参数（与 Python 端一致） ----------
var SALT_B64 = window.__SALT;   // 固定 salt（不保密）
var ITERS = window.__ITERS;     // PBKDF2 迭代
var CIPHER = window.__CIPHER;   // base64( nonce(12) || ct+tag )

// ---------- 工具：base64 <-> ArrayBuffer ----------
function b64ToBuf(b64){
  var bin = atob(b64);
  var len = bin.length, bytes = new Uint8Array(len);
  for(var i=0;i<len;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

// ---------- 解密：密码 -> 明文 JSON 字符串 ----------
async function decrypt(password){
  var enc = new TextEncoder();
  var keyBytes = await crypto.subtle.deriveBits(
    {name:'PBKDF2', salt:b64ToBuf(SALT_B64), iterations:ITERS, hash:'SHA-256'},
    await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveBits']),
    256
  );
  var key = await crypto.subtle.importKey('raw', keyBytes, {name:'AES-GCM'}, false, ['decrypt']);
  var all = new Uint8Array(b64ToBuf(CIPHER));
  var nonce = all.slice(0,12);
  var data = all.slice(12);
  var pt;
  try{
    pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, key, data);
  }catch(e){
    throw new Error('密码错误或数据损坏');
  }
  return new TextDecoder('utf-8').decode(pt);
}

// ---------- 数据 ----------
var TREE = null;          // 解密后的学习树
var FLAT = [];            // 扁平化所有可朗读单元 [{path, title, text, level, parent...}]
var curIdx = -1;          // 当前朗读/查看的单元索引
var revealMode = false;   // 是否显示挖空答案

// ---------- 密码门 ----------
var gate = document.getElementById('gate');
var pwdInput = document.getElementById('pwdInput');
var unlockBtn = document.getElementById('unlockBtn');
var gateErr = document.getElementById('gateErr');

async function tryUnlock(){
  var pwd = pwdInput.value.trim();
  if(!pwd){ gateErr.textContent = '请输入答案。'; return; }
  unlockBtn.disabled = true;
  unlockBtn.textContent = '解密中…';
  gateErr.textContent = '';
  try{
    var json = await decrypt(pwd);
    TREE = JSON.parse(json);
    enterApp();
  }catch(e){
    gateErr.textContent = '❌ 答案不对哦，再想想这是给谁准备的？';
    pwdInput.select();
  }finally{
    unlockBtn.disabled = false;
    unlockBtn.textContent = '进入电台';
  }
}
unlockBtn.addEventListener('click', tryUnlock);
pwdInput.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); tryUnlock(); } });
setTimeout(function(){ pwdInput && pwdInput.focus(); }, 200);

// ---------- 进入应用 ----------
function enterApp(){
  gate.classList.add('unlocked');
  document.getElementById('app').classList.add('shown');

  // 扁平化
  TREE.forEach(function(part, pi){
    part.chapters.forEach(function(chap, ci){
      // 章本身有 text 也算一个单元
      if(chap.text && chap.text.trim()){
        FLAT.push({kind:'chap', pi:pi, ci:ci, title:chap.title, text:chap.text, parent:part.title});
      }
      chap.sections.forEach(function(sec, si){
        FLAT.push({kind:'sec', pi:pi, ci:ci, si:si, title:sec.title, text:sec.text, level:sec.level, parent:chap.title, part:part.title});
      });
    });
  });

  buildNav();
  document.getElementById('navSummary').textContent =
    TREE.length + ' 篇 · ' + FLAT.length + ' 个朗读单元 · 约 ' + Math.round(totalChars()/280) + ' 分钟';
  document.getElementById('topStats').textContent = FLAT.length + ' 节';

  // 默认打开第一个
  openUnit(0);

  // 初始化播放器
  initPlayer();
  initMediaSession();
}

function totalChars(){
  var s=0; FLAT.forEach(function(u){ s+=u.text.length; }); return s;
}

// ---------- 导航构建 ----------
function buildNav(){
  var nav = document.getElementById('navList');
  nav.innerHTML = '';
  TREE.forEach(function(part, pi){
    var d1 = document.createElement('div');
    d1.className = 'nav-item lvl1';
    d1.textContent = part.title;
    nav.appendChild(d1);
    part.chapters.forEach(function(chap, ci){
      var d2 = document.createElement('div');
      d2.className = 'nav-item lvl2';
      d2.textContent = chap.title;
      d2.addEventListener('click', function(){
        // 跳到该章第一个单元
        var idx = FLAT.findIndex(function(u){return u.pi===pi && u.ci===ci;});
        if(idx>=0) openUnit(idx);
        closeNavMobile();
      });
      nav.appendChild(d2);
      chap.sections.forEach(function(sec, si){
        var d3 = document.createElement('div');
        d3.className = 'nav-item lvl3';
        d3.textContent = sec.title;
        d3.addEventListener('click', function(){
          var idx = FLAT.findIndex(function(u){return u.pi===pi && u.ci===ci && u.si===si;});
          if(idx>=0) openUnit(idx);
          closeNavMobile();
        });
        nav.appendChild(d3);
      });
    });
  });
}

// ---------- 正文渲染：保留挖空 ----------
function renderText(text){
  // 把文本转成 HTML：<br> 换行；连续 2+ 个全角空格或下划线视为挖空
  // 易错点 标记保留
  var esc = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 换行
  var html = esc.replace(/\n/g,'<br>');
  // 挖空：识别"连续空白/下划线/多个。"占位 —— 这里原文挖空表现为"标志："后留空
  // 规则：行末或词后的连续 2+ 个空格、或连续下划线 视为填空
  html = html.replace(/(_{2,}|[ ]{3,})/g, '<span class="blank">$&</span>');
  // "易错点" 高亮
  html = html.replace(/(【易错点】[^【\n]*(?:<br>[^【\n]*)*)/g, function(m){
    return '<span class="ezhi">'+m.replace(/<br>/g,'<br>')+'</span>';
  });
  return html;
}

// ---------- 打开某个单元 ----------
function openUnit(idx){
  if(idx<0 || idx>=FLAT.length) return;
  curIdx = idx;
  var u = FLAT[idx];
  var main = document.getElementById('main');

  // 高亮导航
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});

  // 标题区
  var partTitle = u.part || u.parent;
  var html = '';
  html += '<div class="reader-sub"><b>'+esc(partTitle)+'</b> · 第 '+(idx+1)+' / '+FLAT.length+' 单元</div>';
  html += '<h1 class="reader-h1">'+esc(u.title)+'</h1>';

  // 工具栏
  html += '<div class="tool-row">'+
    '<button class="tool-btn" id="readBtn">🔊 朗读本节</button>'+
    '<button class="tool-btn" id="revealBtn">'+(revealMode?'🙈 隐藏答案':'👁 显示填空')+'</button>'+
    '<button class="tool-btn" id="quizBtn">📝 背诵自测</button>'+
  '</div>';

  // 正文
  html += '<div class="chapter-card current" id="cc">';
  html += '<div class="cc-head"><h3>'+esc(u.title)+'</h3>'+
    '<div class="cc-actions">'+
      '<button class="mini-btn play" data-act="read">🔊 读</button>'+
    '</div></div>';
  html += '<div class="body-text" id="bodyText">'+renderText(u.text)+'</div>';
  html += '</div>';

  // 章节导航
  html += '<div class="chap-nav">'+
    '<button id="prevBtn" '+(idx<=0?'disabled':'')+'>← 上一节</button>'+
    '<button class="nx" id="nextBtn" '+(idx>=FLAT.length-1?'disabled':'')+'>下一节 →</button>'+
  '</div>';

  main.innerHTML = html;
  document.getElementById('topTitle').textContent = u.title;
  window.scrollTo(0,0);

  // 绑定
  document.getElementById('readBtn').onclick = function(){ playUnit(idx); };
  document.querySelector('[data-act="read"]').onclick = function(){ playUnit(idx); };
  document.getElementById('revealBtn').onclick = toggleReveal;
  document.getElementById('quizBtn').onclick = function(){ buildQuiz(idx); };
  document.getElementById('prevBtn').onclick = function(){ if(idx>0) openUnit(idx-1); };
  document.getElementById('nextBtn').onclick = function(){ if(idx<FLAT.length-1) openUnit(idx+1); };

  applyReveal();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleReveal(){
  revealMode = !revealMode;
  applyReveal();
  var btn = document.getElementById('revealBtn');
  if(btn) btn.textContent = revealMode ? '🙈 隐藏答案' : '👁 显示填空';
}
function applyReveal(){
  document.querySelectorAll('.blank').forEach(function(el){
    if(revealMode){ el.classList.add('blank-reveal'); el.style.color='var(--brick)'; }
    else { el.classList.remove('blank-reveal'); el.style.color='transparent'; }
  });
}

// ---------- 朗读文本预处理（让 TTS 不读挖空占位符） ----------
function ttsClean(text){
  var t = text
    .replace(/【易错点】/g,'易错点，')
    .replace(/_{2,}/g,'，挖空，')
    .replace(/[ ]{3,}/g,'，挖空，')
    .replace(/[（）()]/g,function(m){return m;})
    .replace(/[\u3000]/g,'')
    .replace(/\n{2,}/g,'。')
    .replace(/\n/g,'，')
    .replace(/-{2,}/g,'');
  // 中英文符号间补一点停顿
  return t;
}

// ================= TTS 播放器 =================
var synth = window.speechSynthesis;
var curUtter = null;
var isPlaying = false;
var isPaused = false;
var rateIdx = 2;
var RATES = [0.8, 0.9, 1.0, 1.1, 1.25, 1.4, 1.6];
var zhVoice = null;
var queue = [];        // 长文本分块队列
var queueIdx = 0;

function loadVoices(){
  var vs = synth.getVoices();
  // 优先选高质量中文女声
  var pref = vs.filter(function(v){return /zh|cmn|Chinese/i.test(v.lang) && /female|女|Ting|Ya|Hui|Xia|Mei/i.test(v.name);});
  zhVoice = pref[0] || vs.filter(function(v){return /zh|cmn/i.test(v.lang);})[0] || null;
}
if(synth){
  loadVoices();
  synth.onvoiceschanged = loadVoices;
}

function splitChunks(text, maxLen){
  // 按句号/问号/叹号/分号切，每块不超过 maxLen
  var parts = text.split(/(?<=[。！？；\.\!\?])/);
  var chunks = [], cur = '';
  for(var i=0;i<parts.length;i++){
    if((cur+parts[i]).length > maxLen && cur){
      chunks.push(cur); cur = parts[i];
    }else{
      cur += parts[i];
    }
  }
  if(cur) chunks.push(cur);
  return chunks.filter(function(s){return s.trim();});
}

function playUnit(idx){
  if(idx<0||idx>=FLAT.length) return;
  curIdx = idx;
  var u = FLAT[idx];
  var cleaned = ttsClean(u.text);
  queue = splitChunks(cleaned, 180);
  queueIdx = 0;
  startQueuePlayback();
  updatePlayerUI(u);
  document.getElementById('player').classList.add('show');
}

function startQueuePlayback(){
  if(!synth) { alert('当前浏览器不支持语音合成，建议用 Chrome/Edge。'); return; }
  synth.cancel();
  isPlaying = true; isPaused = false;
  speakNextChunk();
  updatePlayBtn();
}

function speakNextChunk(){
  if(queueIdx >= queue.length){
    // 本节读完，自动下一节
    if(curIdx < FLAT.length-1){
      playUnit(curIdx+1);
    }else{
      isPlaying = false;
      updatePlayBtn();
      document.getElementById('pNow').textContent = '✅ 全部读完了，辛苦啦！';
      document.getElementById('pSub').textContent = '点击任意节重新开始';
    }
    return;
  }
  var u = new SpeechSynthesisUtterance(queue[queueIdx]);
  u.lang = 'zh-CN';
  if(zhVoice) u.voice = zhVoice;
  u.rate = RATES[rateIdx];
  u.pitch = 1.0;
  u.onend = function(){
    if(isPlaying && !isPaused){
      queueIdx++;
      // 小间隔，避免太急
      setTimeout(speakNextChunk, 60);
    }
  };
  u.onerror = function(){
    // 出错跳过这块
    queueIdx++;
    if(isPlaying) setTimeout(speakNextChunk, 60);
  };
  curUtter = u;
  synth.speak(u);
}

function togglePlay(){
  if(!synth) return;
  if(!isPlaying){
    // 没在播放：从当前节开始
    if(curIdx<0) curIdx=0;
    if(queue.length===0){ playUnit(curIdx); return; }
    // 恢复
    isPlaying = true; isPaused = false;
    speakNextChunk();
  }else{
    // 正在播放：暂停/继续
    if(isPaused){
      synth.resume(); isPaused=false;
    }else{
      synth.pause(); isPaused=true;
    }
  }
  updatePlayBtn();
}

function updatePlayBtn(){
  var b = document.getElementById('pPlay');
  if(!b) return;
  if(!isPlaying) b.textContent = '▶';
  else b.textContent = isPaused ? '▶' : '⏸';
}

function updatePlayerUI(u){
  document.getElementById('pNow').textContent = u.title;
  document.getElementById('pSub').textContent = (u.part||u.parent||'') + ' · 第 '+(curIdx+1)+'/'+FLAT.length+' 节';
  document.getElementById('pPrev').disabled = curIdx<=0;
  document.getElementById('pNext').disabled = curIdx>=FLAT.length-1;
}

function initPlayer(){
  var pp = document.getElementById('player');
  pp.classList.add('show');
  document.getElementById('pPlay').onclick = togglePlay;
  document.getElementById('pPrev').onclick = function(){
    if(curIdx>0){ playUnit(curIdx-1); }
  };
  document.getElementById('pNext').onclick = function(){
    if(curIdx<FLAT.length-1){ playUnit(curIdx+1); }
  };
  document.getElementById('pRate').onclick = function(){
    rateIdx = (rateIdx+1)%RATES.length;
    document.getElementById('pRate').textContent = RATES[rateIdx].toFixed(2).replace(/0$/,'')+'×';
    // 立即应用到下一段
  };
  // 初始 rate 显示
  document.getElementById('pRate').textContent = RATES[rateIdx].toFixed(2).replace(/0$/,'')+'×';
}

// ---------- Media Session：锁屏控制 + 后台保活 ----------
function initMediaSession(){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.setActionHandler('play', function(){ togglePlay(); });
  navigator.mediaSession.setActionHandler('pause', function(){ togglePlay(); });
  navigator.mediaSession.setActionHandler('previoustrack', function(){
    if(curIdx>0) playUnit(curIdx-1);
  });
  navigator.mediaSession.setActionHandler('nexttrack', function(){
    if(curIdx<FLAT.length-1) playUnit(curIdx+1);
  });
}
function updateMediaMeta(u){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: u.title,
    artist: u.part || u.parent || '政治理论背诵',
    album: '磨耳朵电台',
    artwork: []
  });
}
// 播放状态同步
function msState(){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = (isPlaying && !isPaused) ? 'playing' : 'paused';
}

// iOS Safari 后台保活：周期性 resume（防止锁屏暂停）
setInterval(function(){
  if(synth && isPlaying && !isPaused){
    // 部分 iOS 需要 keep-alive
    if(synth.speaking && synth.paused){ synth.resume(); }
  }
  msState();
}, 4000);

// 页面隐藏时不主动取消（让后台继续）；visibility 回来时如果异常则恢复
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible' && isPlaying && !isPaused && synth && synth.paused){
    synth.resume();
  }
});

function openNavMobile(){ document.getElementById('sidenav').classList.add('open'); document.getElementById('mask').classList.add('show'); }
function closeNavMobile(){ document.getElementById('sidenav').classList.remove('open'); document.getElementById('mask').classList.remove('show'); }
document.getElementById('menuBtn').onclick = openNavMobile;
document.getElementById('mask').onclick = closeNavMobile;
document.getElementById('navCloseBtn').onclick = closeNavMobile;

// ---------- 背诵自测题（基于当前节，自动从挖空生成） ----------
function buildQuiz(idx){
  var u = FLAT[idx];
  var main = document.getElementById('main');
  // 找出本节的"定义型"句子做填空题：取含书名号或关键术语的句
  // 简化策略：用本节关键短语做"复述判断题"
  var sentences = ttsClean(u.text).split(/(?<=[。！？])/).filter(function(s){return s.length>10;});
  var quizHTML = '<div class="quiz-wrap"><span class="quiz-tag">📝 背诵自测 · '+esc(u.title)+'</span>';
  quizHTML += '<p style="font-size:.86rem;color:#666">下面是从本节内容出的判断题，帮你检验是否真的记住了。每题选完点「检查」。</p>';

  // 取前 4 句，改造成判断题（随机把一句改成错句或保留原句）
  var picked = sentences.slice(0, Math.min(5, sentences.length));
  picked.forEach(function(s, i){
    // 50% 概率"改成错误版本"：把句子里的某个数字/关键词替换
    var isTrue = Math.random() > 0.5;
    var display = s;
    var answer = 'T';
    if(!isTrue){
      // 尝试替换一个数字
      var mod = s.replace(/(\d+(?:\.\d+)?)/, function(m){
        var n = parseFloat(m);
        if(!isNaN(n)) return n > 5 ? Math.max(1, Math.round(n*0.5)) : (n+3);
        return m;
      });
      if(mod !== s){ display = mod; answer = 'F'; }
      else { answer = 'T'; } // 没数字可改，保持原句
    }
    quizHTML += '<div class="task" data-task="kz'+i+'" data-answer="'+answer+'" '+
      'data-ok="✓ 这句与原文一致，判断正确。" '+
      'data-no="✗ 再对照本节原文，这句和原文表述不完全一致。" '+
      'data-src="依据：本节原文" data-review="回到本节正文对照原文">'+
      '<div class="q"><span class="qn">判断'+(i+1)+'</span>下面这句话是否符合本节原文？<br><span style="font-weight:400;color:#444;background:var(--paper);padding:6px 10px;border-radius:6px;display:block;margin-top:6px">'+esc(display)+'</span></div>'+
      '<div class="opts">'+
        '<button class="opt" data-val="T">✓ 符合原文</button>'+
        '<button class="opt" data-val="F">✗ 与原文不符</button>'+
      '</div>'+
      '<button class="check">检查</button>'+
      '<div class="feedback" aria-live="polite">选择后点击检查，这里会显示反馈。</div>'+
    '</div>';
  });
  quizHTML += '<div style="text-align:center;margin:14px 0"><button class="mini-btn alt" id="backRead">← 返回正文</button></div></div>';

  // 插入到正文卡片后面
  var quizZone = document.createElement('div');
  quizZone.innerHTML = quizHTML;
  var cc = document.getElementById('cc');
  cc.parentNode.insertBefore(quizZone, cc.nextSibling);
  document.getElementById('backRead').onclick = function(){ quizZone.remove(); };
  quizZone.scrollIntoView({behavior:'smooth', block:'start'});
}

document.getElementById('promoBtn').onclick = function(){ document.getElementById('promoModal').classList.add('open'); };
document.getElementById('closeModal').onclick = function(){ document.getElementById('promoModal').classList.remove('open'); };
document.getElementById('promoModal').onclick = function(e){ if(e.target===this) this.classList.remove('open'); };

<!-- ===== 固定互动引擎（原样粘贴，处理背诵自测题） ===== -->
<script>
(function(){
  "use strict";
  function $all(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
  function selectedVals(t){return $all('.opt.selected',t).map(function(o){return o.getAttribute('data-val');}).sort();}
  function setFb(t,state,html){var fb=t.querySelector('.feedback');if(!fb)return;fb.className='feedback'+(state?(' '+state):'');fb.innerHTML=html;}
  function check(t){
    var sel=selectedVals(t);
    if(!sel.length){setFb(t,'no','请先选择一个选项再检查。');return;}
    var ans=(t.getAttribute('data-answer')||'').split(',').map(function(x){return x.trim();}).sort();
    var ok=(sel.join('|')===ans.join('|'));
    var body=ok?(t.getAttribute('data-ok')||'回答正确。'):(t.getAttribute('data-no')||'再想想。');
    var src=t.getAttribute('data-src');
    setFb(t,ok?'ok':'no',(ok?'✅ ':'❌ ')+body+(src?('<span style="display:block;font-size:.8rem;color:#666;margin-top:4px">'+src+'</span>'):''));
  }
  document.addEventListener('click',function(e){
    var opt=e.target.closest && e.target.closest('.opt');
    if(opt){var t=opt.closest('.task');if(!t)return;
      $all('.opt',t).forEach(function(o){o.classList.remove('selected');});
      opt.classList.add('selected');
      return;
    }
    var btn=e.target.closest && e.target.closest('.check');
    if(btn){var tk=btn.closest('.task');if(tk)check(tk);return;}
  });
})();
</script>
